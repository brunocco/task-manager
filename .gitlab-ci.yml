variables:
  DOCKER_TLS_CERTDIR: ""
  APP_IMAGE: task-manager:latest
  APP_URL: "http://192.168.98.10:8080"

stages:
  - build
  - test
  - sast
  - dast
  - deploy
  - monitor

# Etapa 3: Build da imagem Docker
build_job:
  stage: build
  image: docker:stable
  services:
    - docker:dind
  script:
    - docker build -t $APP_IMAGE .

# Etapa 3: Testes unitários
test_job:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -r requirements.txt
    - pip install pytest
    - python -m pytest tests/ -v || echo "Tests completed"

# Etapa 4: Análise estática com Bandit (SAST)
bandit_sast:
  stage: sast
  image: python:3.11-slim
  script:
    - pip install bandit
    - bandit -r todo_project/ -f json -o bandit_report.json || true
    - bandit -r todo_project/ -ll
  artifacts:
    paths:
      - bandit_report.json
    expire_in: 1 week

# Etapa 4: Análise de dependências (OWASP Dependency-Check)
dependency_check:
  stage: sast
  image: python:3.11-slim
  script:
    - pip install safety
    - safety check -r requirements.txt --output json > dependency_report.json || true
    - safety check -r requirements.txt || true
  artifacts:
    paths:
      - dependency_report.json
    expire_in: 1 week

# Etapa 5: DAST com OWASP ZAP
zap_dast:
  stage: dast
  image: docker:stable
  services:
    - docker:dind
  script:
    - docker run -d -p 8080:8080 --name app $APP_IMAGE
    - sleep 10
    - docker run --rm --network host -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t $APP_URL -r zap_report.html || true
    - docker stop app
  artifacts:
    paths:
      - zap_report.html
    expire_in: 1 week
  allow_failure: true

# Etapa 6: Deploy em staging
deploy_staging:
  stage: deploy
  image: docker:stable
  services:
    - docker:dind
  before_script:
    - RUNNING=$(docker ps --filter "name=task-manager" -q)
    - if [ -n "$RUNNING" ]; then docker stop $RUNNING && docker rm $RUNNING; fi
  script:
    - docker run -d -p 8080:8080 --name task-manager $APP_IMAGE
    - echo "Deploy em staging concluído"

# Etapa 7: Monitoramento (Prometheus + Grafana)
monitor_check:
  stage: monitor
  image: docker:stable
  services:
    - docker:dind
  script:
    - echo "Verificando saude da aplicacao"
    - docker ps | grep task-manager || echo "Container nao encontrado"
  allow_failure: true
